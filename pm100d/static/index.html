<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PM100D Power Meter (WebUSB)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; }

        .header {
            background: #1a1d27;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #2a2d3a;
        }
        .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
        .header h1 span { font-size: 12px; color: #666; font-weight: 400; margin-left: 8px; }
        .status-dot {
            width: 10px; height: 10px; border-radius: 50%;
            display: inline-block; margin-right: 8px;
        }
        .status-dot.on { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .status-dot.off { background: #666; }

        .container { display: grid; grid-template-columns: 320px 1fr; gap: 16px; padding: 16px; height: calc(100vh - 60px); }

        .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        .panel {
            background: #1a1d27;
            border: 1px solid #2a2d3a;
            border-radius: 8px;
            padding: 16px;
        }
        .panel h3 {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #888;
            margin-bottom: 12px;
        }

        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.15s;
        }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-secondary { background: #374151; color: #e0e0e0; }
        .btn-secondary:hover { background: #4b5563; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-row { display: flex; gap: 8px; margin-top: 8px; }

        select, input {
            background: #111318;
            border: 1px solid #2a2d3a;
            color: #e0e0e0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            width: 100%;
        }
        select:focus, input:focus { outline: none; border-color: #3b82f6; }

        .field { margin-bottom: 10px; }
        .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }

        .power-display {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .power-value {
            font-size: 48px;
            font-weight: 700;
            font-family: 'Consolas', 'Courier New', monospace;
            color: #4caf50;
            text-shadow: 0 0 20px rgba(76, 175, 80, 0.3);
        }
        .power-unit { font-size: 18px; color: #888; margin-top: 4px; }

        .main-area { display: flex; flex-direction: column; gap: 12px; }

        .chart-container {
            flex: 1;
            min-height: 300px;
            position: relative;
        }

        .info-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            font-size: 12px;
        }
        .info-grid .label { color: #666; }
        .info-grid .value { color: #ccc; text-align: right; font-family: monospace; }

        .log-box {
            background: #111318;
            border: 1px solid #2a2d3a;
            border-radius: 6px;
            padding: 8px 12px;
            font-family: monospace;
            font-size: 12px;
            max-height: 120px;
            overflow-y: auto;
            color: #888;
        }
        .log-box .log-error { color: #ef4444; }
        .log-box .log-ok { color: #22c55e; }

        .notice {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 12px;
            color: #94a3b8;
            line-height: 1.6;
        }
        .notice strong { color: #e2e8f0; }
    </style>
</head>
<body>

<div class="header">
    <h1>PM100D Power Meter<span>WebUSB</span></h1>
    <div id="statusBar">
        <span class="status-dot off" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <!-- Device Panel -->
        <div class="panel">
            <h3>Device</h3>
            <div class="notice" id="driverNotice">
                <strong>Windows:</strong> WebUSB requires WinUSB driver.<br>
                Use <a href="https://zadig.akeo.ie/" target="_blank" style="color:#60a5fa;">Zadig</a>
                to replace the Thorlabs driver with WinUSB.
            </div>
            <div class="btn-row">
                <button class="btn btn-success" id="btnConnect" onclick="connectDevice()">Connect USB</button>
                <button class="btn btn-danger" id="btnDisconnect" onclick="disconnectDevice()" disabled>Disconnect</button>
            </div>
            <div id="deviceInfo" style="margin-top: 12px; display: none;">
                <div class="info-grid">
                    <span class="label">IDN</span><span class="value" id="infoIdn">-</span>
                    <span class="label">Sensor</span><span class="value" id="infoSensor">-</span>
                    <span class="label">WL Range</span><span class="value" id="infoWlRange">-</span>
                    <span class="label">Power Range</span><span class="value" id="infoPwrRange">-</span>
                </div>
            </div>
        </div>

        <!-- Config Panel -->
        <div class="panel">
            <h3>Configuration</h3>
            <div class="field">
                <label>Wavelength (nm)</label>
                <div class="btn-row">
                    <input type="number" id="cfgWavelength" value="632.8" step="0.1">
                    <button class="btn btn-primary" onclick="setWavelength()">Set</button>
                </div>
            </div>
            <div class="field">
                <label>Averaging Count</label>
                <div class="btn-row">
                    <input type="number" id="cfgAveraging" value="1" min="1" step="1">
                    <button class="btn btn-primary" onclick="setAveraging()">Set</button>
                </div>
            </div>
            <div class="field">
                <label>Power Unit</label>
                <div class="btn-row">
                    <select id="cfgUnit">
                        <option value="W">W</option>
                        <option value="DBM">dBm</option>
                    </select>
                    <button class="btn btn-primary" onclick="setUnit()">Set</button>
                </div>
            </div>
            <div class="field">
                <label>Power Range</label>
                <div class="btn-row" style="align-items: center;">
                    <input type="number" id="cfgRange" step="0.001" style="flex:1;">
                    <button class="btn btn-primary" onclick="setRange()">Set</button>
                </div>
                <div style="margin-top: 6px;">
                    <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                        <input type="checkbox" id="cfgAutoRange" onchange="setAutoRange()"> Auto Range
                    </label>
                </div>
            </div>
            <button class="btn btn-secondary" style="width:100%; margin-top: 4px;" onclick="refreshConfig()">Refresh Config</button>
        </div>

        <!-- Calibration Panel -->
        <div class="panel">
            <h3>Calibration</h3>
            <div class="btn-row">
                <button class="btn btn-primary" onclick="startZero()">Zero</button>
                <button class="btn btn-secondary" onclick="checkZeroStatus()">Check Status</button>
            </div>
            <div id="zeroStatus" style="margin-top: 8px; font-size: 12px; color: #888;"></div>
        </div>

        <!-- Measurement Control -->
        <div class="panel">
            <h3>Acquisition</h3>
            <div class="field">
                <label>Interval (ms)</label>
                <input type="number" id="acqInterval" value="100" min="10" step="10">
            </div>
            <div class="btn-row">
                <button class="btn btn-success" id="btnStart" onclick="startAcquisition()">Start</button>
                <button class="btn btn-danger" id="btnStop" onclick="stopAcquisition()" disabled>Stop</button>
                <button class="btn btn-secondary" onclick="singleRead()">Single</button>
            </div>
            <div class="btn-row" style="margin-top: 4px;">
                <button class="btn btn-secondary" style="flex:1;" onclick="clearChart()">Clear Chart</button>
            </div>
        </div>
    </div>

    <div class="main-area">
        <!-- Power Display -->
        <div class="panel power-display">
            <div class="power-value" id="powerValue">---</div>
            <div class="power-unit" id="powerUnit">W</div>
        </div>

        <!-- Chart -->
        <div class="panel chart-container">
            <canvas id="powerChart"></canvas>
        </div>

        <!-- Log -->
        <div class="panel">
            <h3>Log</h3>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  USBTMC over WebUSB
// ============================================================
class USBTMC {
    constructor() {
        this.device = null;
        this.interfaceNumber = -1;
        this.endpointIn = -1;
        this.endpointOut = -1;
        this._bTag = 0;
    }

    _nextTag() {
        this._bTag = (this._bTag % 255) + 1;
        return this._bTag;
    }

    async open(device) {
        this.device = device;
        await device.open();

        if (device.configuration === null) {
            await device.selectConfiguration(1);
        }

        // Find USBTMC interface (class 0xFE, subclass 0x03)
        for (const iface of device.configuration.interfaces) {
            for (const alt of iface.alternates) {
                if (alt.interfaceClass === 0xFE && alt.interfaceSubclass === 0x03) {
                    this.interfaceNumber = iface.interfaceNumber;
                    for (const ep of alt.endpoints) {
                        if (ep.type === 'bulk' && ep.direction === 'out')
                            this.endpointOut = ep.endpointNumber;
                        else if (ep.type === 'bulk' && ep.direction === 'in')
                            this.endpointIn = ep.endpointNumber;
                    }
                }
            }
        }

        if (this.interfaceNumber === -1)
            throw new Error('No USBTMC interface found on this device');

        await device.claimInterface(this.interfaceNumber);
    }

    async write(command) {
        const tag = this._nextTag();
        const payload = new TextEncoder().encode(command + '\n');
        const size = payload.length;
        const padding = (4 - (size % 4)) % 4;

        const buf = new ArrayBuffer(12 + size + padding);
        const view = new DataView(buf);
        const arr = new Uint8Array(buf);

        view.setUint8(0, 1);                // MsgID: DEV_DEP_MSG_OUT
        view.setUint8(1, tag);
        view.setUint8(2, ~tag & 0xFF);
        view.setUint32(4, size, true);       // TransferSize (LE)
        view.setUint8(8, 0x01);              // bmTransferAttributes: EOM
        arr.set(payload, 12);

        await this.device.transferOut(this.endpointOut, buf);
    }

    async read(maxLen = 4096) {
        const tag = this._nextTag();

        // Send REQUEST_DEV_DEP_MSG_IN
        const req = new ArrayBuffer(12);
        const rv = new DataView(req);
        rv.setUint8(0, 2);                  // MsgID: REQUEST_DEV_DEP_MSG_IN
        rv.setUint8(1, tag);
        rv.setUint8(2, ~tag & 0xFF);
        rv.setUint32(4, maxLen, true);

        await this.device.transferOut(this.endpointOut, req);

        // Read DEV_DEP_MSG_IN from Bulk-IN
        const result = await this.device.transferIn(this.endpointIn, maxLen + 16);
        if (result.status !== 'ok')
            throw new Error('USB transferIn failed: ' + result.status);

        const dv = new DataView(result.data.buffer);
        const transferSize = dv.getUint32(4, true);

        // Collect data: first packet has 12-byte header
        let received = Math.min(result.data.byteLength - 12, transferSize);
        const output = new Uint8Array(transferSize);
        output.set(new Uint8Array(result.data.buffer, 12, received));

        // Read continuation packets if needed
        while (received < transferSize) {
            const extra = await this.device.transferIn(this.endpointIn, maxLen);
            if (extra.status !== 'ok') break;
            const chunk = new Uint8Array(extra.data.buffer);
            const n = Math.min(chunk.length, transferSize - received);
            output.set(chunk.subarray(0, n), received);
            received += n;
        }

        return new TextDecoder().decode(output).trim();
    }

    async query(command) {
        await this.write(command);
        return await this.read();
    }

    async close() {
        if (!this.device) return;
        try { await this.device.releaseInterface(this.interfaceNumber); } catch {}
        try { await this.device.close(); } catch {}
        this.device = null;
        this.interfaceNumber = -1;
    }
}

// ============================================================
//  PM100D high-level driver
// ============================================================
class PM100DDriver {
    constructor() {
        this.tmc = new USBTMC();
        this.connected = false;
    }

    async connect() {
        const device = await navigator.usb.requestDevice({
            filters: [
                { vendorId: 0x1313, productId: 0x8078 },
                { classCode: 0xFE, subclassCode: 0x03 },
            ]
        });
        await this.tmc.open(device);
        this.connected = true;
    }

    async reconnect() {
        const devices = await navigator.usb.getDevices();
        const dev = devices.find(d => d.vendorId === 0x1313 && d.productId === 0x8078);
        if (dev) {
            await this.tmc.open(dev);
            this.connected = true;
            return true;
        }
        return false;
    }

    async disconnect() {
        await this.tmc.close();
        this.connected = false;
    }

    // --- Info ---
    async idn()            { return this.tmc.query('*IDN?'); }
    async sensorInfo()     { return this.tmc.query('SYST:SENS:IDN?'); }
    async wavelengthRange() {
        const min = parseFloat(await this.tmc.query('SENS:CORR:WAV? MIN'));
        const max = parseFloat(await this.tmc.query('SENS:CORR:WAV? MAX'));
        return [min, max];
    }
    async powerRangeLimits() {
        const min = parseFloat(await this.tmc.query('SENS:POW:DC:RANG:UPP? MIN'));
        const max = parseFloat(await this.tmc.query('SENS:POW:DC:RANG:UPP? MAX'));
        return [min, max];
    }

    // --- Measurement ---
    async readPower()      { return parseFloat(await this.tmc.query('MEAS:SCAL:POW?')); }

    // --- Config get ---
    async getWavelength()  { return parseFloat(await this.tmc.query('SENS:CORR:WAV?')); }
    async getPowerRange()  { return parseFloat(await this.tmc.query('SENS:POW:DC:RANG:UPP?')); }
    async getAutoRange()   { return parseInt(await this.tmc.query('SENS:POW:DC:RANG:AUTO?')) === 1; }
    async getAveraging()   { return parseInt(await this.tmc.query('SENS:AVER:COUN?')); }
    async getPowerUnit()   { return (await this.tmc.query('SENS:POW:DC:UNIT?')).replace(/"/g, ''); }
    async getBeamDiameter(){ return parseFloat(await this.tmc.query('SENS:CORR:BEAM?')); }

    // --- Config set ---
    async setWavelength(nm)      { await this.tmc.write(`SENS:CORR:WAV ${nm}`); }
    async setPowerRange(w)       { await this.tmc.write(`SENS:POW:DC:RANG:UPP ${w}`); }
    async setAutoRange(on)       { await this.tmc.write(`SENS:POW:DC:RANG:AUTO ${on ? 1 : 0}`); }
    async setAveraging(count)    { await this.tmc.write(`SENS:AVER:COUN ${count}`); }
    async setPowerUnit(unit)     { await this.tmc.write(`SENS:POW:DC:UNIT ${unit.toUpperCase()}`); }

    // --- Calibration ---
    async zeroStart()      { await this.tmc.write('SENS:CORR:COLL:ZERO:INIT'); }
    async zeroState()      { return parseInt(await this.tmc.query('SENS:CORR:COLL:ZERO:STAT?')) === 1; }
}

// ============================================================
//  Globals
// ============================================================
const pm = new PM100DDriver();
let acquiring = false;
let acqTimer = null;
let cachedUnit = 'W';
const MAX_POINTS = 500;

// ============================================================
//  Chart
// ============================================================
const ctx = document.getElementById('powerChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Power',
            data: [],
            borderColor: '#4caf50',
            backgroundColor: 'rgba(76,175,80,0.1)',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: true,
            tension: 0.2,
        }]
    },
    options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        scales: {
            x: {
                display: true,
                ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } },
                grid: { color: '#1e2030' },
            },
            y: {
                display: true,
                ticks: { color: '#555', font: { size: 10 } },
                grid: { color: '#1e2030' },
                title: { display: true, text: 'Power', color: '#555', font: { size: 11 } },
            }
        },
        plugins: { legend: { display: false } }
    }
});

function addChartPoint(power) {
    const t = new Date();
    const label = t.toLocaleTimeString('en', { hour12: false }) + '.' + String(t.getMilliseconds()).padStart(3, '0');
    chart.data.labels.push(label);
    chart.data.datasets[0].data.push(power);
    if (chart.data.labels.length > MAX_POINTS) {
        chart.data.labels.shift();
        chart.data.datasets[0].data.shift();
    }
    chart.update();
}

function clearChart() {
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();
    log('Chart cleared');
}

// ============================================================
//  Logging
// ============================================================
function log(msg, type = '') {
    const box = document.getElementById('logBox');
    const cls = type === 'error' ? 'log-error' : type === 'ok' ? 'log-ok' : '';
    const time = new Date().toLocaleTimeString('en', { hour12: false });
    box.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// ============================================================
//  Power formatting
// ============================================================
function formatPower(p) {
    const abs = Math.abs(p);
    if (abs === 0) return '0.000';
    if (abs < 1e-9) return (p * 1e12).toFixed(3) + ' pW';
    if (abs < 1e-6) return (p * 1e9).toFixed(3) + ' nW';
    if (abs < 1e-3) return (p * 1e6).toFixed(3) + ' uW';
    if (abs < 1)    return (p * 1e3).toFixed(3) + ' mW';
    return p.toFixed(6) + ' W';
}

function updatePowerDisplay(power, unit) {
    const el  = document.getElementById('powerValue');
    const uel = document.getElementById('powerUnit');
    if (unit.toUpperCase() === 'DBM') {
        el.textContent  = power.toFixed(3);
        uel.textContent = 'dBm';
    } else {
        el.textContent  = formatPower(power).replace(/ [a-zA-Z]+$/, '');
        const suffix = formatPower(power).match(/ [a-zA-Z]+$/);
        uel.textContent = suffix ? suffix[0].trim() : 'W';
    }
}

// ============================================================
//  Device connect / disconnect
// ============================================================
async function connectDevice() {
    try {
        await pm.connect();
        log('Connected via WebUSB', 'ok');
        updateConnectionUI(true);
        await loadDeviceInfo();
        await refreshConfig();
    } catch (e) {
        log('Connect error: ' + e.message, 'error');
    }
}

async function disconnectDevice() {
    stopAcquisition();
    try {
        await pm.disconnect();
        log('Disconnected', 'ok');
        updateConnectionUI(false);
    } catch (e) {
        log('Disconnect error: ' + e.message, 'error');
    }
}

function updateConnectionUI(connected) {
    document.getElementById('statusDot').className = 'status-dot ' + (connected ? 'on' : 'off');
    document.getElementById('statusText').textContent = connected ? 'Connected (WebUSB)' : 'Disconnected';
    document.getElementById('btnConnect').disabled = connected;
    document.getElementById('btnDisconnect').disabled = !connected;
    document.getElementById('deviceInfo').style.display = connected ? 'block' : 'none';
}

async function loadDeviceInfo() {
    try {
        const idn = await pm.idn();
        const sensor = await pm.sensorInfo();
        const wlRange = await pm.wavelengthRange();
        const pwrRange = await pm.powerRangeLimits();
        document.getElementById('infoIdn').textContent = idn;
        document.getElementById('infoSensor').textContent = sensor;
        document.getElementById('infoWlRange').textContent = `${wlRange[0]} - ${wlRange[1]} nm`;
        document.getElementById('infoPwrRange').textContent = `${pwrRange[0].toExponential(2)} - ${pwrRange[1].toExponential(2)} W`;
    } catch (e) { log('Info error: ' + e.message, 'error'); }
}

// ============================================================
//  Configuration
// ============================================================
async function refreshConfig() {
    try {
        const wl   = await pm.getWavelength();
        const avg  = await pm.getAveraging();
        const unit = await pm.getPowerUnit();
        const rng  = await pm.getPowerRange();
        const auto = await pm.getAutoRange();
        cachedUnit = unit;
        document.getElementById('cfgWavelength').value = wl;
        document.getElementById('cfgAveraging').value  = avg;
        document.getElementById('cfgUnit').value        = unit;
        document.getElementById('cfgRange').value       = rng;
        document.getElementById('cfgAutoRange').checked = auto;
        log('Config refreshed', 'ok');
    } catch (e) { log('Config error: ' + e.message, 'error'); }
}

async function setWavelength() {
    try {
        const v = parseFloat(document.getElementById('cfgWavelength').value);
        await pm.setWavelength(v);
        log(`Wavelength set to ${v} nm`, 'ok');
    } catch (e) { log('Set wavelength error: ' + e.message, 'error'); }
}

async function setAveraging() {
    try {
        const v = parseInt(document.getElementById('cfgAveraging').value);
        await pm.setAveraging(v);
        log(`Averaging set to ${v}`, 'ok');
    } catch (e) { log('Set averaging error: ' + e.message, 'error'); }
}

async function setUnit() {
    try {
        const v = document.getElementById('cfgUnit').value;
        await pm.setPowerUnit(v);
        cachedUnit = v;
        log(`Unit set to ${v}`, 'ok');
    } catch (e) { log('Set unit error: ' + e.message, 'error'); }
}

async function setRange() {
    try {
        const v = parseFloat(document.getElementById('cfgRange').value);
        await pm.setPowerRange(v);
        log(`Range set to ${v}`, 'ok');
    } catch (e) { log('Set range error: ' + e.message, 'error'); }
}

async function setAutoRange() {
    try {
        const v = document.getElementById('cfgAutoRange').checked;
        await pm.setAutoRange(v);
        log(`Auto range: ${v}`, 'ok');
    } catch (e) { log('Set auto range error: ' + e.message, 'error'); }
}

// ============================================================
//  Calibration
// ============================================================
async function startZero() {
    try {
        await pm.zeroStart();
        log('Zero calibration started', 'ok');
        document.getElementById('zeroStatus').textContent = 'Zeroing...';
    } catch (e) { log('Zero error: ' + e.message, 'error'); }
}

async function checkZeroStatus() {
    try {
        const zeroing = await pm.zeroState();
        const msg = zeroing ? 'Zeroing in progress...' : 'Zero complete';
        document.getElementById('zeroStatus').textContent = msg;
        log('Zero status: ' + msg);
    } catch (e) { log('Zero status error: ' + e.message, 'error'); }
}

// ============================================================
//  Measurement & Acquisition
// ============================================================
async function singleRead() {
    try {
        const power = await pm.readPower();
        updatePowerDisplay(power, cachedUnit);
        addChartPoint(power);
        log(`Single read: ${formatPower(power)}`);
    } catch (e) { log('Read error: ' + e.message, 'error'); }
}

function startAcquisition() {
    if (acquiring) return;
    acquiring = true;
    document.getElementById('btnStart').disabled = true;
    document.getElementById('btnStop').disabled  = false;
    const interval = parseInt(document.getElementById('acqInterval').value) || 100;
    log(`Acquisition started (${interval} ms)`, 'ok');
    acquisitionLoop(interval);
}

function stopAcquisition() {
    if (!acquiring) return;
    acquiring = false;
    if (acqTimer) { clearTimeout(acqTimer); acqTimer = null; }
    document.getElementById('btnStart').disabled = false;
    document.getElementById('btnStop').disabled  = true;
    log('Acquisition stopped', 'ok');
}

async function acquisitionLoop(interval) {
    if (!acquiring) return;
    const t0 = performance.now();
    try {
        const power = await pm.readPower();
        updatePowerDisplay(power, cachedUnit);
        addChartPoint(power);
    } catch (e) {
        log('Acq read error: ' + e.message, 'error');
    }
    if (!acquiring) return;
    const elapsed = performance.now() - t0;
    const delay = Math.max(0, interval - elapsed);
    acqTimer = setTimeout(() => acquisitionLoop(interval), delay);
}

// ============================================================
//  Init
// ============================================================
window.addEventListener('load', async () => {
    if (!navigator.usb) {
        log('WebUSB not supported. Use Chrome or Edge.', 'error');
        document.getElementById('btnConnect').disabled = true;
        return;
    }
    log('PM100D WebUSB GUI loaded');

    // Try to reconnect to a previously paired device
    try {
        const ok = await pm.reconnect();
        if (ok) {
            log('Auto-reconnected to PM100D', 'ok');
            updateConnectionUI(true);
            await loadDeviceInfo();
            await refreshConfig();
        }
    } catch (e) { /* no previously paired device */ }
});

navigator.usb?.addEventListener('disconnect', (e) => {
    if (pm.tmc.device === e.device) {
        stopAcquisition();
        pm.connected = false;
        pm.tmc.device = null;
        updateConnectionUI(false);
        log('USB device disconnected', 'error');
    }
});
</script>
