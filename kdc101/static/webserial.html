<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KDC101 DC Servo Controller (WebSerial)</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e0e0e0; }

        .header {
            background: #1a1d27; padding: 16px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 1px solid #2a2d3a;
        }
        .header h1 { font-size: 20px; font-weight: 600; color: #fff; }
        .header h1 span { font-size: 12px; color: #666; font-weight: 400; margin-left: 8px; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .status-dot.on { background: #4caf50; box-shadow: 0 0 6px #4caf50; }
        .status-dot.off { background: #666; }

        .container { display: grid; grid-template-columns: 340px 1fr; gap: 16px; padding: 16px; height: calc(100vh - 60px); }
        .sidebar { display: flex; flex-direction: column; gap: 12px; overflow-y: auto; }

        .panel { background: #1a1d27; border: 1px solid #2a2d3a; border-radius: 8px; padding: 16px; }
        .panel h3 { font-size: 13px; text-transform: uppercase; letter-spacing: 1px; color: #888; margin-bottom: 12px; }

        .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
        .btn-primary { background: #3b82f6; color: #fff; }
        .btn-primary:hover { background: #2563eb; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #16a34a; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #dc2626; }
        .btn-warning { background: #f59e0b; color: #fff; }
        .btn-warning:hover { background: #d97706; }
        .btn-secondary { background: #374151; color: #e0e0e0; }
        .btn-secondary:hover { background: #4b5563; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-row { display: flex; gap: 8px; margin-top: 8px; }

        select, input { background: #111318; border: 1px solid #2a2d3a; color: #e0e0e0; padding: 8px 12px; border-radius: 6px; font-size: 13px; width: 100%; }
        select:focus, input:focus { outline: none; border-color: #3b82f6; }

        .field { margin-bottom: 10px; }
        .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }

        .position-display { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 24px; }
        .position-value { font-size: 48px; font-weight: 700; font-family: 'Consolas', 'Courier New', monospace; color: #3b82f6; text-shadow: 0 0 20px rgba(59,130,246,0.3); }
        .position-unit { font-size: 18px; color: #888; margin-top: 4px; }

        .status-indicators { display: flex; gap: 12px; margin-top: 12px; flex-wrap: wrap; justify-content: center; }
        .indicator { display: flex; align-items: center; gap: 4px; font-size: 12px; color: #666; }
        .indicator .dot { width: 8px; height: 8px; border-radius: 50%; background: #333; }
        .indicator .dot.active { background: #4caf50; box-shadow: 0 0 4px #4caf50; }
        .indicator .dot.warn { background: #f59e0b; box-shadow: 0 0 4px #f59e0b; }
        .indicator .dot.error { background: #ef4444; box-shadow: 0 0 4px #ef4444; }

        .main-area { display: flex; flex-direction: column; gap: 12px; }
        .chart-container { flex: 1; min-height: 250px; position: relative; }

        .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; font-size: 12px; }
        .info-grid .label { color: #666; }
        .info-grid .value { color: #ccc; text-align: right; font-family: monospace; }

        .log-box { background: #111318; border: 1px solid #2a2d3a; border-radius: 6px; padding: 8px 12px; font-family: monospace; font-size: 12px; max-height: 120px; overflow-y: auto; color: #888; }
        .log-box .log-error { color: #ef4444; }
        .log-box .log-ok { color: #22c55e; }

        .notice { background: #1e293b; border: 1px solid #334155; border-radius: 6px; padding: 10px 14px; font-size: 12px; color: #94a3b8; line-height: 1.6; margin-bottom: 8px; }
        .notice strong { color: #e2e8f0; }

        .jog-controls { display: flex; gap: 8px; align-items: center; justify-content: center; }
        .jog-btn { width: 56px; height: 44px; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .stop-btn { width: 80px; height: 44px; font-size: 13px; font-weight: 700; }
    </style>
</head>
<body>

<div class="header">
    <h1>KDC101 DC Servo Controller<span>WebSerial</span></h1>
    <div id="statusBar">
        <span class="status-dot off" id="statusDot"></span>
        <span id="statusText">Disconnected</span>
    </div>
</div>

<div class="container">
    <div class="sidebar">
        <!-- Device Panel -->
        <div class="panel">
            <h3>Device</h3>
            <div class="notice">
                <strong>WebSerial:</strong> Direct browser-to-device communication.<br>
                Requires Chrome/Edge. The KDC101 must appear as a COM port (FTDI driver).
            </div>
            <div class="btn-row" style="margin-top: 0;">
                <button class="btn btn-success" id="btnConnect" onclick="connectDevice()">Connect Serial</button>
                <button class="btn btn-danger" id="btnDisconnect" onclick="disconnectDevice()" disabled>Disconnect</button>
            </div>
            <div id="deviceInfo" style="margin-top: 12px; display: none;">
                <div class="info-grid">
                    <span class="label">Model</span><span class="value" id="infoModel">-</span>
                    <span class="label">S/N</span><span class="value" id="infoSerial">-</span>
                    <span class="label">Firmware</span><span class="value" id="infoFirmware">-</span>
                </div>
            </div>
        </div>

        <!-- Motion Panel -->
        <div class="panel">
            <h3>Motion Control</h3>
            <div class="btn-row" style="margin-top: 0;">
                <button class="btn btn-warning" style="flex:1;" onclick="homeStage()">Home</button>
                <button class="btn btn-danger stop-btn" onclick="stopMotion()">STOP</button>
            </div>
            <div class="field" style="margin-top: 12px;">
                <label>Move Absolute (mm)</label>
                <div class="btn-row">
                    <input type="number" id="moveAbsPos" value="5.0" step="0.1">
                    <button class="btn btn-primary" onclick="moveAbsolute()">Go</button>
                </div>
            </div>
            <div class="field">
                <label>Move Relative (mm)</label>
                <div class="btn-row">
                    <input type="number" id="moveRelDist" value="1.0" step="0.1">
                    <button class="btn btn-primary" onclick="moveRelFwd()">+ Fwd</button>
                    <button class="btn btn-primary" onclick="moveRelRev()">- Rev</button>
                </div>
            </div>
            <div style="margin-top: 12px;">
                <label style="font-size: 12px; color: #888; margin-bottom: 8px; display: block;">Jog</label>
                <div class="jog-controls">
                    <button class="btn btn-secondary jog-btn" onclick="jogReverse()">&larr;</button>
                    <button class="btn btn-danger stop-btn" onclick="stopImmediate()">E-STOP</button>
                    <button class="btn btn-secondary jog-btn" onclick="jogForward()">&rarr;</button>
                </div>
            </div>
        </div>

        <!-- Config Panel -->
        <div class="panel">
            <h3>Configuration</h3>
            <div class="field">
                <label>Encoder Counts / mm</label>
                <input type="number" id="cfgCounts" value="34555" step="1">
            </div>
            <div class="field">
                <label>Polling Interval (ms)</label>
                <input type="number" id="pollInterval" value="200" min="50" step="50">
            </div>
            <div class="btn-row">
                <button class="btn btn-success" id="btnPollStart" onclick="startPolling()">Start Polling</button>
                <button class="btn btn-danger" id="btnPollStop" onclick="stopPolling()" disabled>Stop</button>
            </div>
            <div class="btn-row" style="margin-top: 4px;">
                <button class="btn btn-secondary" style="flex:1;" onclick="readStatusOnce()">Read Once</button>
                <button class="btn btn-secondary" style="flex:1;" onclick="clearChart()">Clear Chart</button>
            </div>
        </div>
    </div>

    <div class="main-area">
        <!-- Position Display -->
        <div class="panel position-display">
            <div class="position-value" id="positionValue">---</div>
            <div class="position-unit">mm</div>
            <div class="status-indicators">
                <div class="indicator"><span class="dot" id="indHomed"></span>Homed</div>
                <div class="indicator"><span class="dot" id="indMoving"></span>Moving</div>
                <div class="indicator"><span class="dot" id="indFwdLim"></span>Fwd Limit</div>
                <div class="indicator"><span class="dot" id="indRevLim"></span>Rev Limit</div>
            </div>
        </div>

        <!-- Chart -->
        <div class="panel chart-container">
            <canvas id="posChart"></canvas>
        </div>

        <!-- Log -->
        <div class="panel">
            <h3>Log</h3>
            <div class="log-box" id="logBox"></div>
        </div>
    </div>
</div>

<script>
// ============================================================
//  APT Protocol over WebSerial
// ============================================================
const SOURCE = 0x01;
const DEST = 0x50;

const HW_REQ_INFO = 0x0005;
const HW_GET_INFO = 0x0006;
const HW_NO_FLASH_PROGRAMMING = 0x0018;
const MOD_SET_CHANENABLESTATE = 0x0210;
const MOT_MOVE_HOME = 0x0443;
const MOT_MOVE_HOMED = 0x0444;
const MOT_MOVE_RELATIVE = 0x0448;
const MOT_MOVE_ABSOLUTE = 0x0453;
const MOT_MOVE_COMPLETED = 0x0464;
const MOT_MOVE_STOP = 0x0465;
const MOT_MOVE_JOG = 0x046A;
const MOT_REQ_DCSTATUSUPDATE = 0x0490;
const MOT_GET_DCSTATUSUPDATE = 0x0491;

const STATUS_FWD_HW_LIM = 0x01;
const STATUS_REV_HW_LIM = 0x02;
const STATUS_MOVING_BITS = 0x10 | 0x20 | 0x40 | 0x80 | 0x200;
const STATUS_HOMED = 0x400;

class APTSerial {
    constructor() {
        this.port = null;
        this.reader = null;
        this.writer = null;
        this.connected = false;
        this._rxBuffer = new Uint8Array(0);
        this._readableStream = null;
    }

    async connect() {
        this.port = await navigator.serial.requestPort({
            filters: [{ usbVendorId: 0x0403 }] // FTDI
        });
        await this.port.open({ baudRate: 115200, dataBits: 8, parity: 'none', stopBits: 1, flowControl: 'none' });
        this.writer = this.port.writable.getWriter();
        this._readableStream = this.port.readable;
        this.connected = true;
        this._startReader();
    }

    _startReader() {
        // Continuously read serial data into buffer
        this._readerRunning = true;
        this._readLoop();
    }

    async _readLoop() {
        while (this._readerRunning && this._readableStream) {
            try {
                this.reader = this._readableStream.getReader();
                while (this._readerRunning) {
                    const { value, done } = await this.reader.read();
                    if (done) break;
                    if (value) {
                        const newBuf = new Uint8Array(this._rxBuffer.length + value.length);
                        newBuf.set(this._rxBuffer);
                        newBuf.set(value, this._rxBuffer.length);
                        this._rxBuffer = newBuf;
                    }
                }
                this.reader.releaseLock();
            } catch (e) {
                if (this._readerRunning) {
                    try { this.reader.releaseLock(); } catch {}
                }
                break;
            }
        }
    }

    async sendShort(msgId, param1 = 0, param2 = 0) {
        const buf = new Uint8Array(6);
        const dv = new DataView(buf.buffer);
        dv.setUint16(0, msgId, true);
        buf[2] = param1;
        buf[3] = param2;
        buf[4] = DEST;
        buf[5] = SOURCE;
        await this.writer.write(buf);
    }

    async sendLong(msgId, data) {
        const buf = new Uint8Array(6 + data.length);
        const dv = new DataView(buf.buffer);
        dv.setUint16(0, msgId, true);
        dv.setUint16(2, data.length, true);
        buf[4] = DEST | 0x80;
        buf[5] = SOURCE;
        buf.set(data, 6);
        await this.writer.write(buf);
    }

    async recvMessage(timeoutMs = 2000) {
        const deadline = performance.now() + timeoutMs;
        while (performance.now() < deadline) {
            if (this._rxBuffer.length >= 6) {
                const header = this._rxBuffer.slice(0, 6);
                const dv = new DataView(header.buffer);
                const msgId = dv.getUint16(0, true);

                if (header[4] & 0x80) {
                    // Data message
                    const dataLen = dv.getUint16(2, true);
                    if (this._rxBuffer.length >= 6 + dataLen) {
                        const data = this._rxBuffer.slice(6, 6 + dataLen);
                        this._rxBuffer = this._rxBuffer.slice(6 + dataLen);
                        return { msgId, data };
                    }
                } else {
                    // Header-only
                    this._rxBuffer = this._rxBuffer.slice(6);
                    return { msgId, param1: header[2], param2: header[3] };
                }
            }
            await new Promise(r => setTimeout(r, 10));
        }
        return null;
    }

    async waitForMessage(targetMsgId, timeoutMs = 5000) {
        const deadline = performance.now() + timeoutMs;
        while (performance.now() < deadline) {
            const msg = await this.recvMessage(deadline - performance.now());
            if (msg && msg.msgId === targetMsgId) return msg;
            if (!msg) break;
        }
        return null;
    }

    async disconnect() {
        this._readerRunning = false;
        try { this.reader?.releaseLock(); } catch {}
        try { this.writer?.releaseLock(); } catch {}
        try { await this.port?.close(); } catch {}
        this.port = null;
        this.connected = false;
        this._rxBuffer = new Uint8Array(0);
    }
}

// ============================================================
//  KDC101 high-level driver
// ============================================================
class KDC101Driver {
    constructor() {
        this.apt = new APTSerial();
        this.countsPerMm = 34555;
    }

    get connected() { return this.apt.connected; }

    async connect() {
        await this.apt.connect();
        // Disable flash programming
        await this.apt.sendShort(HW_NO_FLASH_PROGRAMMING, 0, 0);
        await sleep(100);
        // Enable channel 1
        await this.apt.sendShort(MOD_SET_CHANENABLESTATE, 0x01, 0x01);
        await sleep(100);
    }

    async disconnect() { await this.apt.disconnect(); }

    async getHwInfo() {
        await this.apt.sendShort(HW_REQ_INFO, 0, 0);
        const msg = await this.apt.waitForMessage(HW_GET_INFO);
        if (!msg || !msg.data) throw new Error('No HW_GET_INFO response');
        const dv = new DataView(msg.data.buffer);
        const serial = dv.getUint32(0, true);
        const model = new TextDecoder().decode(msg.data.slice(4, 12)).replace(/\0/g, '').trim();
        const fwMinor = msg.data[14], fwInterim = msg.data[15], fwMajor = msg.data[16];
        return { serial, model, firmware: `${fwMajor}.${fwInterim}.${fwMinor}` };
    }

    async getStatus() {
        await this.apt.sendShort(MOT_REQ_DCSTATUSUPDATE, 0x01, 0);
        const msg = await this.apt.waitForMessage(MOT_GET_DCSTATUSUPDATE, 2000);
        if (!msg || !msg.data) throw new Error('No status response');
        const dv = new DataView(msg.data.buffer);
        const positionCounts = dv.getInt32(2, true);
        const velocity = dv.getUint16(6, true);
        const statusBits = dv.getUint32(10, true);
        return {
            position_counts: positionCounts,
            position_mm: positionCounts / this.countsPerMm,
            velocity,
            status_bits: statusBits,
            is_homed: !!(statusBits & STATUS_HOMED),
            is_moving: !!(statusBits & STATUS_MOVING_BITS),
            fwd_limit: !!(statusBits & STATUS_FWD_HW_LIM),
            rev_limit: !!(statusBits & STATUS_REV_HW_LIM),
        };
    }

    async home() {
        await this.apt.sendShort(MOT_MOVE_HOME, 0x01, 0);
    }

    async moveAbsolute(positionMm) {
        const counts = Math.round(positionMm * this.countsPerMm);
        const data = new Uint8Array(6);
        const dv = new DataView(data.buffer);
        dv.setUint16(0, 0x01, true);
        dv.setInt32(2, counts, true);
        await this.apt.sendLong(MOT_MOVE_ABSOLUTE, data);
    }

    async moveRelative(distanceMm) {
        const counts = Math.round(distanceMm * this.countsPerMm);
        const data = new Uint8Array(6);
        const dv = new DataView(data.buffer);
        dv.setUint16(0, 0x01, true);
        dv.setInt32(2, counts, true);
        await this.apt.sendLong(MOT_MOVE_RELATIVE, data);
    }

    async jog(direction) {
        await this.apt.sendShort(MOT_MOVE_JOG, 0x01, direction);
    }

    async stop(immediate = false) {
        await this.apt.sendShort(MOT_MOVE_STOP, 0x01, immediate ? 0x01 : 0x02);
    }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ============================================================
//  Globals
// ============================================================
const kdc = new KDC101Driver();
let polling = false;
let pollTimer = null;
const MAX_POINTS = 500;

// ============================================================
//  Chart
// ============================================================
const ctx = document.getElementById('posChart').getContext('2d');
const chart = new Chart(ctx, {
    type: 'line',
    data: {
        labels: [],
        datasets: [{
            label: 'Position',
            data: [],
            borderColor: '#3b82f6',
            backgroundColor: 'rgba(59,130,246,0.1)',
            borderWidth: 1.5, pointRadius: 0, fill: true, tension: 0.2,
        }]
    },
    options: {
        responsive: true, maintainAspectRatio: false, animation: false,
        scales: {
            x: { display: true, ticks: { color: '#555', maxTicksLimit: 8, font: { size: 10 } }, grid: { color: '#1e2030' } },
            y: { display: true, ticks: { color: '#555', font: { size: 10 } }, grid: { color: '#1e2030' },
                 title: { display: true, text: 'Position (mm)', color: '#555', font: { size: 11 } } }
        },
        plugins: { legend: { display: false } }
    }
});

function addChartPoint(position) {
    const t = new Date();
    const label = t.toLocaleTimeString('en', { hour12: false }) + '.' + String(t.getMilliseconds()).padStart(3, '0');
    chart.data.labels.push(label);
    chart.data.datasets[0].data.push(position);
    if (chart.data.labels.length > MAX_POINTS) { chart.data.labels.shift(); chart.data.datasets[0].data.shift(); }
    chart.update();
}

function clearChart() {
    chart.data.labels = [];
    chart.data.datasets[0].data = [];
    chart.update();
    log('Chart cleared');
}

// ============================================================
//  Logging
// ============================================================
function log(msg, type = '') {
    const box = document.getElementById('logBox');
    const cls = type === 'error' ? 'log-error' : type === 'ok' ? 'log-ok' : '';
    const time = new Date().toLocaleTimeString('en', { hour12: false });
    box.innerHTML += `<div class="${cls}">[${time}] ${msg}</div>`;
    box.scrollTop = box.scrollHeight;
}

// ============================================================
//  Device
// ============================================================
async function connectDevice() {
    try {
        await kdc.connect();
        log('Connected via WebSerial', 'ok');
        updateConnectionUI(true);
        await loadDeviceInfo();
    } catch (e) { log('Connect error: ' + e.message, 'error'); }
}

async function disconnectDevice() {
    stopPolling();
    try {
        await kdc.disconnect();
        log('Disconnected', 'ok');
        updateConnectionUI(false);
    } catch (e) { log('Disconnect error: ' + e.message, 'error'); }
}

function updateConnectionUI(connected) {
    document.getElementById('statusDot').className = 'status-dot ' + (connected ? 'on' : 'off');
    document.getElementById('statusText').textContent = connected ? 'Connected (WebSerial)' : 'Disconnected';
    document.getElementById('btnConnect').disabled = connected;
    document.getElementById('btnDisconnect').disabled = !connected;
    document.getElementById('deviceInfo').style.display = connected ? 'block' : 'none';
}

async function loadDeviceInfo() {
    try {
        const info = await kdc.getHwInfo();
        document.getElementById('infoModel').textContent = info.model;
        document.getElementById('infoSerial').textContent = info.serial;
        document.getElementById('infoFirmware').textContent = info.firmware;
    } catch (e) { log('HW info error: ' + e.message, 'error'); }
}

// ============================================================
//  Motion
// ============================================================
async function homeStage() {
    try { await kdc.home(); log('Homing started...', 'ok'); }
    catch (e) { log('Home error: ' + e.message, 'error'); }
}

async function moveAbsolute() {
    const pos = parseFloat(document.getElementById('moveAbsPos').value);
    try { await kdc.moveAbsolute(pos); log(`Moving to ${pos} mm...`, 'ok'); }
    catch (e) { log('Move error: ' + e.message, 'error'); }
}

async function moveRelFwd() {
    const dist = parseFloat(document.getElementById('moveRelDist').value);
    try { await kdc.moveRelative(dist); log(`Moving +${dist} mm...`, 'ok'); }
    catch (e) { log('Move error: ' + e.message, 'error'); }
}

async function moveRelRev() {
    const dist = parseFloat(document.getElementById('moveRelDist').value);
    try { await kdc.moveRelative(-dist); log(`Moving -${dist} mm...`, 'ok'); }
    catch (e) { log('Move error: ' + e.message, 'error'); }
}

async function jogForward() {
    try { await kdc.jog(1); log('Jogging forward', 'ok'); }
    catch (e) { log('Jog error: ' + e.message, 'error'); }
}

async function jogReverse() {
    try { await kdc.jog(2); log('Jogging reverse', 'ok'); }
    catch (e) { log('Jog error: ' + e.message, 'error'); }
}

async function stopMotion() {
    try { await kdc.stop(false); log('Stop (profiled)', 'ok'); }
    catch (e) { log('Stop error: ' + e.message, 'error'); }
}

async function stopImmediate() {
    try { await kdc.stop(true); log('E-STOP', 'ok'); }
    catch (e) { log('E-Stop error: ' + e.message, 'error'); }
}

// ============================================================
//  Status polling
// ============================================================
async function readStatusOnce() {
    try {
        const st = await kdc.getStatus();
        updateDisplay(st);
        log(`Position: ${st.position_mm.toFixed(4)} mm | Homed: ${st.is_homed}`);
    } catch (e) { log('Status error: ' + e.message, 'error'); }
}

function startPolling() {
    if (polling) return;
    kdc.countsPerMm = parseFloat(document.getElementById('cfgCounts').value) || 34555;
    polling = true;
    document.getElementById('btnPollStart').disabled = true;
    document.getElementById('btnPollStop').disabled = false;
    const interval = parseInt(document.getElementById('pollInterval').value) || 200;
    log(`Polling started (${interval} ms)`, 'ok');
    pollLoop(interval);
}

function stopPolling() {
    if (!polling) return;
    polling = false;
    if (pollTimer) { clearTimeout(pollTimer); pollTimer = null; }
    document.getElementById('btnPollStart').disabled = false;
    document.getElementById('btnPollStop').disabled = true;
    log('Polling stopped', 'ok');
}

async function pollLoop(interval) {
    if (!polling) return;
    const t0 = performance.now();
    try {
        const st = await kdc.getStatus();
        updateDisplay(st);
        addChartPoint(st.position_mm);
    } catch (e) {
        log('Poll error: ' + e.message, 'error');
    }
    if (!polling) return;
    const delay = Math.max(0, interval - (performance.now() - t0));
    pollTimer = setTimeout(() => pollLoop(interval), delay);
}

function updateDisplay(st) {
    document.getElementById('positionValue').textContent = st.position_mm.toFixed(4);
    setDot('indHomed', st.is_homed ? 'active' : '');
    setDot('indMoving', st.is_moving ? 'warn' : '');
    setDot('indFwdLim', st.fwd_limit ? 'error' : '');
    setDot('indRevLim', st.rev_limit ? 'error' : '');
}

function setDot(id, cls) {
    document.getElementById(id).className = 'dot' + (cls ? ' ' + cls : '');
}

// ============================================================
//  Init
// ============================================================
window.addEventListener('load', () => {
    if (!navigator.serial) {
        log('WebSerial not supported. Use Chrome or Edge.', 'error');
        document.getElementById('btnConnect').disabled = true;
        return;
    }
    log('KDC101 WebSerial GUI loaded');
});

navigator.serial?.addEventListener('disconnect', (e) => {
    if (kdc.apt.port === e.target) {
        stopPolling();
        kdc.apt.connected = false;
        updateConnectionUI(false);
        log('Serial device disconnected', 'error');
    }
});
</script>
</body>
</html>
